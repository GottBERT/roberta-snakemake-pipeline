# path to the in file, containing all data (one document per line)
in_file: ../files/example/de_dedup.txt

# if the in_file is already shuffled
corpus_already_shuffled: True

# how many bpe tokens should be user
vocab_size: 520

# number of randomly selected documents for the validation & test set
num_docs_valid_test_set: 120

# size in bytes, with which BPE is created e.g.: 7GB = 7000000000
size_bpe_train_file: 4000

# the number of splits created in parallel computation
# usually this equals to `nproc --a`
num_files: 12

# set to false if sequential computation is desired
# this might be in case of limited disk space 
bpe_apply_parallel: true

# tmp folder in which split files will be stored 
# in case of parrallel computation
bpe_apply_dir_tmp: /tmp

# text language
# supported languages:
#  - German
language: German

# output directory, relative from the workflow folder
dir_output: '../output'
